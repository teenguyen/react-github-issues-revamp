services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
            - .git/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml
