services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Only sync package.json and lockfile as volume
    volumes:
      - ./package.json:/app/package.json
      - ./yarn.lock:/app/yarn.lock
      - /app/node_modules
    environment:
      - NODE_ENV=development
    # Docker Compose v2.16+ develop/watch for hot reload
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
